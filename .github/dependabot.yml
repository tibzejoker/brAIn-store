# Weekly dependency PRs — GitHub Actions only (this repo has no
# runtime deps, just a registry JSON store). Minor + patch grouped,
# MAJORS IGNORED — action-version majors are breaking by definition
# (input/output surface changes) and need a human read of the
# release notes.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly, day: monday }
    open-pull-requests-limit: 2
    groups:
      actions-minor-and-patch:
        update-types: [minor, patch]
    ignore:
      - dependency-name: "*"
        update-types: [version-update:semver-major]
