# brAIn-store gitleaks config.
#
# The registry.json maps every shipped file to its SHA-256 digest for
# marketplace install-time verification. Those 64-char hex strings sit
# one line below a `"...": "` key and trip gitleaks' generic-api-key
# rule. Mirror the allowlist from the workspace-root .gitleaks.toml so
# this repo's CI scans cleanly while the underlying secret detection
# keeps running.

title = "brAIn-store gitleaks"

[extend]
useDefault = true

[allowlist]
description = "Skip the marketplace registry file — it's pure metadata (SHA-256 fingerprints + repo descriptors), not credentials"
# Path-based allowlist (not regex) — robust against legitimately
# extension-less filenames like `.gitignore` whose 64-hex SHA-256
# digests live in the same JSON. registry.json is the ONLY place
# we hand-write 64-hex strings; everything else still gets the
# default ruleset.
paths = [
  '''registry\.json''',
]
